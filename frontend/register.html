<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKSHYA National Bank - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper" style="padding: 2rem 1rem;">
    <div class="auth-card fade-in" style="max-width:560px;">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="bank-icon">🏦</div>
            <h2>Create Your Account</h2>
            <p>Join LAKSHYA National Bank today</p>
        </div>

        <!-- Alert -->
        <div id="formAlert" class="alert"></div>

        <!-- Registration Form -->
        <form id="registerForm" novalidate>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" class="form-control"
                           placeholder="Lakshya" required>
                    <span class="error-message" id="firstNameError"></span>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" class="form-control"
                           placeholder="Dhaneshwar" required>
                    <span class="error-message" id="lastNameError"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" class="form-control"
                       placeholder="lakshya@example.com" required>
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" class="form-control"
                       placeholder="10-digit mobile number" maxlength="10" required>
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="address">Address *</label>
                <input type="text" id="address" class="form-control"
                       placeholder="Your full address" required>
                <span class="error-message" id="addressError"></span>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth * (Must be 18+)</label>
                <input type="date" id="dob" class="form-control" required>
                <span class="error-message" id="dobError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password * (min 6 chars + 1 number)</label>
                <input type="password" id="password" class="form-control"
                       placeholder="Create a strong password" required>
                <span class="error-message" id="passwordError"></span>
                <!-- Password Strength -->
                <div style="margin-top:0.4rem;">
                    <div style="height:4px; background:#dee2e6; border-radius:2px; overflow:hidden;">
                        <div id="strengthBar" style="height:100%; width:0%; transition:all 0.3s;"></div>
                    </div>
                    <small id="strengthText" style="color:var(--text-muted);"></small>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" class="form-control"
                       placeholder="Re-enter your password" required>
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <div class="form-group" style="display:flex;align-items:flex-start;gap:0.5rem;">
                <input type="checkbox" id="terms" style="margin-top:4px;">
                <label for="terms" style="font-weight:400; font-size:0.85rem; cursor:pointer;">
                    I agree to the <a href="#" style="color:var(--primary-light);">Terms & Conditions</a>
                    and <a href="#" style="color:var(--primary-light);">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" id="registerBtn" class="btn btn-primary btn-block">
                Create Account
            </button>
        </form>

        <div class="divider">OR</div>
        <div class="text-center" style="font-size:0.9rem;">
            Already have an account? <a href="login.html"><strong>Sign In</strong></a>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    // Check terms before submit
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        if (!document.getElementById('terms').checked) {
            e.stopImmediatePropagation();
            e.preventDefault();
            showAlert('formAlert', 'Please accept the Terms & Conditions to proceed.', 'warning');
        }
    }, true);
</script>
</body>
</html>
