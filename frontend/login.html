<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKSHYA National Bank - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card fade-in">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="bank-icon">🏦</div>
            <h2>LAKSHYA National Bank</h2>
            <p>Sign in to your account</p>
        </div>

        <!-- Alert -->
        <div id="loginAlert" class="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>

            <div class="form-group">
                <label for="loginId">Customer ID</label>
                <input type="text" id="loginId" class="form-control"
                       placeholder="e.g. CUST1234" autocomplete="username" required>
                <span class="error-message" id="loginIdError"></span>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="form-control"
                       placeholder="Enter your password" autocomplete="current-password" required>
                <span class="error-message" id="loginPasswordError"></span>
            </div>

            <div class="d-flex justify-between align-center mb-2" style="font-size:0.85rem;">
                <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;">
                    <input type="checkbox" id="showPassword"> Show Password
                </label>
                <a href="#" style="color:var(--primary-light);">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <div class="divider">OR</div>

        <div class="text-center" style="font-size:0.9rem;">
            Don't have an account? <a href="register.html"><strong>Register Now</strong></a>
        </div>

        <div style="margin-top:1.5rem; background:var(--light-bg); padding:1rem; border-radius:8px; font-size:0.82rem; color:var(--text-muted);">
            <strong>Demo Tip:</strong> Register first to get a Customer ID, then login with that ID and password.
        </div>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    // Show/hide password toggle
    document.getElementById('showPassword').addEventListener('change', function () {
        const pwd = document.getElementById('loginPassword');
        pwd.type = this.checked ? 'text' : 'password';
    });
</script>
</body>
</html>
